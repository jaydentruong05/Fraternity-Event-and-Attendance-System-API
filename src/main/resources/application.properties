# ===========================
# Application
# ===========================
spring.application.name=LphieBackend
server.port=${PORT:8080}

# ===========================
# PostgreSQL Database
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/lphie_db
spring.datasource.username=lphie_user
spring.datasource.password=lphie_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Local officer login. Production overrides these with environment variables.
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:lphie-password}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Adopt an existing local schema at version 0, then apply versioned migrations.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
